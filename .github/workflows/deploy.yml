name: Deploy to GitHub Pages

# Builds the app and publishes the built site (dist/) to the `gh-pages` branch.
# GitHub Pages then serves that branch. Runs automatically on every push to main.
on:
  push:
    branches: [main]
  workflow_dispatch:

# Publishing pushes a commit to the gh-pages branch, which needs write access.
permissions:
  contents: write

# Let a running deploy finish; queue the next one.
concurrency:
  group: pages-deploy
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}

      # Force-push the freshly built dist/ as the entire contents of gh-pages.
      # `.nojekyll` tells Pages to serve the files as-is (no Jekyll processing).
      - name: Publish to gh-pages
        run: |
          set -e
          touch dist/.nojekyll
          cd dist
          git init -q
          git checkout -q -b gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -q -m "Deploy ${GITHUB_SHA}"
          git push -f "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" gh-pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
